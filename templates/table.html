<!DOCTYPE html>
<html>
  <head>
    <title>Search by Location</title>
  </head>

  <body>
    <h1>Devices still in use in {{ location }}</h1>
    <table border="1">
      <tr>
        <th>Serial Number</th>
        <th>Type</th>
      </tr>
      {% for item in data %}
        <tr>
          <td>{{ item[0] }}</td>
          <td>{{ item[1] }}</td>
        </tr>
      {% endfor %}
    </table>
  </body>
</html>
